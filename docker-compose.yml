services:
  # Frontend Service (Next.js)
  frontend:
    container_name: zaplandia-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
    depends_on:
      - backend-core
    networks:
      - zaplandia-network

  # Backend Core Service (Node.js/NestJS)
  backend-core:
    container_name: zaplandia-backend-core
    build:
      context: ./backend-core
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=zaplandia
      - DB_PASS=zaplandia_secret
      - DB_NAME=zaplandia_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=zaplandia_super_secret_key_2026
      - AI_SERVICE_URL=http://backend-ai:8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - INTERNAL_WEBHOOK_URL=https://www.zaplandia.com.br/api/webhooks/evolution
      - TZ=UTC
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - zaplandia-network

  # Backend AI Service (Python/FastAPI)
  backend-ai:
    container_name: zaplandia-backend-ai
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TZ=America/Sao_Paulo
    depends_on:
      - redis
    networks:
      - zaplandia-network

  # 🤖 Ollama - LLM Própria da Zaplandia (GRÁTIS, sem custo de token!)
  ollama:
    image: ollama/ollama:latest
    container_name: zaplandia-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 6G
    networks:
      - zaplandia-network

  # Database Service (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: zaplandia-postgres
    restart: always
    environment:
      - POSTGRES_USER=zaplandia
      - POSTGRES_PASSWORD=zaplandia_secret
      - POSTGRES_DB=zaplandia_db
      - TZ=America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zaplandia-network

  # Redis Service (Caching/Queues)
  redis:
    image: redis:alpine
    container_name: zaplandia-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zaplandia-network

networks:
  zaplandia-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
